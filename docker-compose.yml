services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the named Docker volume mount path.
      # 4 slashes = absolute path in container (sqlite+aiosqlite:////data/app.db)
      DATABASE_URL: sqlite+aiosqlite:////data/app.db
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]      
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlite_data:
