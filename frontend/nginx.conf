server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA — all unmatched paths fall back to index.html
    # This allows React Router paths (e.g. /analysis, /login) to work without 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE streaming endpoint — must be before the general /api/ block
    # Disables buffering and sets long timeouts so the stream is not cut mid-flight.
    location /api/analyses/stream/ {
        proxy_pass http://backend:8000/analyses/stream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires buffering to be off — otherwise nginx buffers chunks and
        # delivers them all at once (or cuts with ERR_INCOMPLETE_CHUNKED_ENCODING).
        proxy_buffering off;
        proxy_cache off;

        # Keep the connection open while Gemini is processing (can take 30-60 s).
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Pass the chunked transfer encoding through unchanged.
        chunked_transfer_encoding on;
    }

    # Proxy all other API calls to the backend service
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
